<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--wlh-ink);  font-family: var(--font-body, system-ui, sans-serif); }
  .stage { width:100%; min-height:100vh; display:grid; grid-template-rows: 1fr auto; padding:24px; gap:14px; box-sizing:border-box; }
  .img-wrap { display:grid; place-items:center; min-height: 320px; }
  .img-wrap img { width:62%; height:auto; display:block; max-height:380px; object-fit:contain; }
  .meta { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .tag {
    font-family: var(--font-heading);
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--wlh-sun-yellow);
  }
  .swatch {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 9px; color: rgba(250,241,222,0.55);
    letter-spacing: 0.04em;
  }
</style></head>
<body>
<div class="stage">
  <div class="img-wrap"><img src="../assets/logos/seal-vertical-wordmark-white.png" alt="Vertical · Ink"></div>
  <div class="meta">
    <span class="tag">Vertical · Ink</span>
    <span class="swatch">#16293A · seal-vertical-wordmark-white.png</span>
  </div>
</div>
</body></html>
