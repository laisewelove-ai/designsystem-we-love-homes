<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--wlh-off-white); }
  .card-frame { padding: 28px 32px; }
  .display-row { font-family: var(--font-display); font-size: 90px; line-height: 0.95; color: var(--accent); }
  .small-label { font-family: var(--font-heading); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-muted); font-weight: 600; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="card-frame">
  <div class="small-label">Display · Caveat Brush <span style="color:#C13B2E;">(substitute for Summer)</span></div>
  <div class="display-row">Seu porto seguro no Chile.</div>
</div>
</body>
</html>
