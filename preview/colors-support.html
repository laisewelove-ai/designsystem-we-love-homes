<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--wlh-sand-cream); }
  .card-frame { padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .col { display: flex; flex-direction: column; gap: 4px; }
  .swatch { width:100%;height:64px; border-radius: 12px; border: 1px solid var(--border); }
  .name { font-family: var(--font-heading); font-size: 11px; font-weight: 600; color: var(--fg); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style>
</head>
<body>
<div class="card-frame">
  <div class="grid">
    <div class="col"><div class="swatch" style="background:#FFE99A;"></div><div class="name">Pale Lemon</div><div class="hex">#FFE99A</div></div>
    <div class="col"><div class="swatch" style="background:#5A8A6B;"></div><div class="name">Cactus Green</div><div class="hex">#5A8A6B</div></div>
    <div class="col"><div class="swatch" style="background:#B5D4DD;"></div><div class="name">Sky Wash</div><div class="hex">#B5D4DD</div></div>
    <div class="col"><div class="swatch" style="background:#5C8AA6;"></div><div class="name">Info Blue</div><div class="hex">#5C8AA6</div></div>
  </div>
</div>
</body>
</html>
