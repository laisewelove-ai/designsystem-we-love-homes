<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--wlh-sand-cream); }
  .card-frame { padding: 20px 24px; }
  .row { display: flex; align-items: center; gap: 16px; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-heading); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-muted); font-weight: 600; }
  .swatch { border-radius: 14px; box-shadow: var(--sh-sm); border: 1px solid var(--border); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
  .name { font-family: var(--font-heading); font-size: 13px; font-weight: 600; color: var(--fg); }
  .role { font-family: var(--font-heading); font-size: 10px; font-weight: 700; color: var(--fg-muted); text-transform: uppercase; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="card-frame">
  <div class="row" style="gap:24px;">
    <div class="col" style="gap:6px;">
      <div class="swatch" style="width:160px;height:90px;background:#FFC533;"></div>
      <div class="role">60 · herói</div>
      <div class="name">Sun Yellow</div>
      <div class="hex">#FFC533</div>
    </div>
    <div class="col" style="gap:6px;">
      <div class="swatch" style="width:160px;height:90px;background:#1F3A4D;"></div>
      <div class="role">30 · ink</div>
      <div class="name">Deep Petrol</div>
      <div class="hex">#1F3A4D</div>
    </div>
    <div class="col" style="gap:6px;">
      <div class="swatch" style="width:160px;height:90px;background:#FAF1DE;border:1px solid #E8DEC8;"></div>
      <div class="role">10 · canvas</div>
      <div class="name">Sand Cream</div>
      <div class="hex">#FAF1DE</div>
    </div>
  </div>
</div>
</body>
</html>
