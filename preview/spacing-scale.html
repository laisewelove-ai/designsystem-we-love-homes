<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--wlh-off-white); }
  .frame { padding: 22px 24px; display:flex; flex-direction:column; gap: 18px; }
  .label { font-family: var(--font-heading); font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color: var(--fg-muted); font-weight:600; }
  .row { display:flex; align-items:flex-end; gap: 8px; }
  .box { background: var(--wlh-powder-aqua); border-radius: 6px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); margin-top: 6px; text-align: center; }
  .item { display:flex; flex-direction:column; align-items:center; }
</style></head>
<body><div class="frame">
  <div class="label">Spacing scale · 4px grid</div>
  <div class="row">
    <div class="item"><div class="box" style="width:4px;height:30px;"></div><div class="tok">4 · sp-1</div></div>
    <div class="item"><div class="box" style="width:8px;height:30px;"></div><div class="tok">8 · sp-2</div></div>
    <div class="item"><div class="box" style="width:12px;height:30px;"></div><div class="tok">12 · sp-3</div></div>
    <div class="item"><div class="box" style="width:16px;height:30px;"></div><div class="tok">16 · sp-4</div></div>
    <div class="item"><div class="box" style="width:24px;height:30px;"></div><div class="tok">24 · sp-6</div></div>
    <div class="item"><div class="box" style="width:32px;height:30px;"></div><div class="tok">32 · sp-8</div></div>
    <div class="item"><div class="box" style="width:48px;height:30px;"></div><div class="tok">48 · sp-12</div></div>
    <div class="item"><div class="box" style="width:64px;height:30px;"></div><div class="tok">64 · sp-16</div></div>
  </div>
</div></body></html>
