<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--wlh-off-white); }
  .card-frame { padding: 22px 24px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .label { font-family: var(--font-heading); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--fg-muted); font-weight: 600; width: 80px; flex-shrink:0; }
  .num { font-family: var(--font-heading); font-weight: 800; color: var(--wlh-golden-yellow); line-height: 0.9; letter-spacing: -0.02em; }
  .num-coral { color: var(--accent); }
  .unit { font-family: var(--font-heading); font-size: 14px; color: var(--fg-muted); margin-left: 4px; }
</style>
</head>
<body>
<div class="card-frame">
  <div class="row"><span class="label">Hero stat</span><span class="num" style="font-size:88px;">R$ 480</span><span class="unit">/ noite</span></div>
  <div class="row"><span class="label">Rating</span><span class="num" style="font-size:64px;">4,9</span><span style="font-size:32px;color:#FFC533;">★</span><span class="unit">· 218 avaliações</span></div>
  <div class="row"><span class="label">Counts</span><span class="num num-coral" style="font-size:48px;">3</span><span class="unit">noites</span><span class="num num-coral" style="font-size:48px;margin-left:24px;">2</span><span class="unit">hóspedes</span></div>
</div>
</body>
</html>
