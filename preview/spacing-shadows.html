<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--wlh-off-white); }
  .frame { padding: 24px; display:flex; gap: 22px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .square { width: 80px; height:80px; background: #fff; border-radius: 16px; }
  .tok { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .name { font-family: var(--font-heading); font-size: 11px; font-weight: 600; color: var(--fg); }
</style></head>
<body><div class="frame">
  <div class="item"><div class="square" style="box-shadow: 0 1px 2px rgba(31,58,77,0.06);"></div><div class="name">xs</div><div class="tok">--sh-xs</div></div>
  <div class="item"><div class="square" style="box-shadow: 0 2px 6px rgba(31,58,77,0.08);"></div><div class="name">sm</div><div class="tok">--sh-sm</div></div>
  <div class="item"><div class="square" style="box-shadow: 0 6px 18px rgba(31,58,77,0.10);"></div><div class="name">md</div><div class="tok">--sh-md</div></div>
  <div class="item"><div class="square" style="box-shadow: 0 14px 36px rgba(31,58,77,0.14);"></div><div class="name">lg</div><div class="tok">--sh-lg</div></div>
  <div class="item"><div class="square" style="box-shadow: 0 28px 60px rgba(31,58,77,0.18);"></div><div class="name">xl</div><div class="tok">--sh-xl</div></div>
  <div class="item"><div class="square" style="background:#FFC533;box-shadow: 0 8px 24px rgba(255,197,51,0.42);"></div><div class="name">coral glow</div><div class="tok">--sh-glow-coral</div></div>
</div></body></html>
