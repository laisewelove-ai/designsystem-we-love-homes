<!DOCTYPE html>
<html lang="pt-br"><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background: var(--wlh-off-white); }
  .frame { padding: 24px; display:flex; flex-direction:column; gap:14px; max-width: 360px; }
  .field { display:flex; flex-direction:column; gap:6px; position: relative; }
  .field label { font-family: var(--font-heading); font-size:12px; font-weight:600; color: var(--fg); }
  .field .input-wrap { position: relative; }
  /* Soft yellow glow behind the input — sits on a pseudo-element so it can spread beyond the input box */
  .field .input-wrap::before {
    content: ""; position: absolute; inset: -10px; border-radius: 20px;
    background: radial-gradient(ellipse at center, rgba(90,138,107,0.55), rgba(90,138,107,0) 70%);
    filter: blur(10px); opacity: 0; transition: opacity 220ms ease; pointer-events: none; z-index: 0;
  }
  .field input, .field select {
    position: relative; z-index: 1; width: 100%; box-sizing: border-box;
    font-family: var(--font-body); font-size:15px; padding: 12px 14px;
    border-radius: 12px; border: 1.5px solid var(--border); background: #fff; color: var(--fg);
    outline: none; transition: border 180ms ease, box-shadow 220ms ease;
  }
  .field input:focus,
  .field.is-focused input {
    border-color: var(--wlh-cactus-green);
    box-shadow: 0 0 0 3px rgba(90,138,107,0.22), 0 8px 24px -6px rgba(90,138,107,0.45);
  }
  .field input:focus + .glow,
  .field.is-focused .input-wrap::before { opacity: 1; }
  .field:focus-within .input-wrap::before { opacity: 1; }
  .field .hint { font-size:11px; color: var(--fg-muted); }
  .field.error input { border-color: var(--wlh-deep-red); box-shadow: 0 0 0 3px rgba(193,59,46,0.14); }
  .field.error .input-wrap::before {
    background: radial-gradient(ellipse at center, rgba(193,59,46,0.40), rgba(193,59,46,0) 70%);
    opacity: 0.9;
  }
  .field.error .hint { color: var(--wlh-deep-red); }
  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
</style></head>
<body><div class="frame">
  <div class="field is-focused"><label>Para onde?</label><div class="input-wrap"><input value="Santiago, Chile" /></div></div>
  <div class="row2">
    <div class="field"><label>Check-in</label><div class="input-wrap"><input value="12 jun" /></div></div>
    <div class="field"><label>Check-out</label><div class="input-wrap"><input value="17 jun" /></div></div>
  </div>
  <div class="field error"><label>E-mail</label><div class="input-wrap"><input value="maria@" /></div><span class="hint">Esse e-mail parece incompleto.</span></div>
</div></body></html>
